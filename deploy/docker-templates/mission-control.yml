version: '3.8'

# Mission Control - AI Agent Task Orchestration Platform
# Full stack: PostgreSQL, Redis, FastAPI backend, Next.js frontend

name: openclaw-mission-control

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mission_control}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}  # Set in .env file
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-mission_control}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      DB_AUTO_MIGRATE: ${DB_AUTO_MIGRATE:-true}
      AUTH_MODE: ${AUTH_MODE}
      LOCAL_AUTH_TOKEN: ${LOCAL_AUTH_TOKEN}
      RQ_REDIS_URL: redis://redis:6379/0
      ARENA_ALLOWED_AGENTS: ${ARENA_ALLOWED_AGENTS:-friday,arsenal,edith,jocasta}
      ARENA_REVIEWER_AGENT: ${ARENA_REVIEWER_AGENT:-arsenal}
      NOTEBOOKLM_RUNNER_CMD: ${NOTEBOOKLM_RUNNER_CMD:-uvx --from notebooklm-mcp-cli@latest nlm}
      NOTEBOOKLM_PROFILES_ROOT: ${NOTEBOOKLM_PROFILES_ROOT:-/var/lib/notebooklm/profiles}
      NOTEBOOKLM_TIMEOUT_SECONDS: ${NOTEBOOKLM_TIMEOUT_SECONDS:-120}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8100}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8100}
        NEXT_PUBLIC_AUTH_MODE: ${AUTH_MODE}
    restart: unless-stopped
    env_file:
      - path: ./frontend/.env
        required: false
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8100}
      NEXT_PUBLIC_AUTH_MODE: ${AUTH_MODE}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3100}:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  webhook-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    command: ["rq", "worker", "-u", "redis://redis:6379/0"]
    env_file:
      - ./backend/.env.example
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-mission_control}
      AUTH_MODE: ${AUTH_MODE}
      LOCAL_AUTH_TOKEN: ${LOCAL_AUTH_TOKEN}
      RQ_REDIS_URL: redis://redis:6379/0
      RQ_QUEUE_NAME: ${RQ_QUEUE_NAME:-default}
      RQ_DISPATCH_THROTTLE_SECONDS: ${RQ_DISPATCH_THROTTLE_SECONDS:-2.0}
      RQ_DISPATCH_MAX_RETRIES: ${RQ_DISPATCH_MAX_RETRIES:-3}
      ARENA_ALLOWED_AGENTS: ${ARENA_ALLOWED_AGENTS:-friday,arsenal,edith,jocasta}
      ARENA_REVIEWER_AGENT: ${ARENA_REVIEWER_AGENT:-arsenal}
      NOTEBOOKLM_RUNNER_CMD: ${NOTEBOOKLM_RUNNER_CMD:-uvx --from notebooklm-mcp-cli@latest nlm}
      NOTEBOOKLM_PROFILES_ROOT: ${NOTEBOOKLM_PROFILES_ROOT:-/var/lib/notebooklm/profiles}
      NOTEBOOKLM_TIMEOUT_SECONDS: ${NOTEBOOKLM_TIMEOUT_SECONDS:-120}

volumes:
  postgres_data:

# Optional: External network for agent communication
# networks:
#   agent-network:
#     external: true
